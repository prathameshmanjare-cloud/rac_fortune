<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talwar & Dhal — Scroll Animation</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: radial-gradient(ellipse at center, #2a1a08 0%, #0d0804 100%); overflow-x:hidden; min-height:100vh; }

  .scroll-wrapper {
    height: 400vh;
    position: relative;
  }

  .sticky-scene {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Dark stone texture bg */
  .sticky-scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(80,50,10,0.35) 0%, transparent 70%),
      radial-gradient(ellipse at 30% 70%, rgba(60,30,5,0.3) 0%, transparent 60%);
  }

  .scene {
    position: relative;
    width: min(500px, 90vw);
    height: min(500px, 90vw);
  }

  /* DHAL */
  #dhal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88%;
    height: 88%;
    object-fit: contain;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.8)) drop-shadow(0 4px 16px rgba(180,130,20,0.3));
    z-index: 2;
  }

  /* TALWARS */
  #talwar-left, #talwar-right {
    position: absolute;
    object-fit: contain;
    z-index: 1;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.9));
    transform-origin: center center;
    will-change: transform, opacity;
  }

  /* Left talwar: handle at bottom-left, tip to top-right */
  #talwar-left {
    width: 120%;
    height: 120%;
    top: -10%;
    left: -60%;
  }

  /* Right talwar: mirrored - handle at bottom-right, tip to top-left */
  #talwar-right {
    width: 120%;
    height: 120%;
    top: -10%;
    right: -60%;
    transform: scaleX(-1);
  }

  /* Scroll hint */
  .hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: #d4a020;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: opacity 0.5s;
    z-index: 100;
  }
  .hint.gone { opacity: 0; pointer-events: none; }
  .chevron {
    width: 16px; height: 16px;
    border-right: 2px solid #d4a020;
    border-bottom: 2px solid #d4a020;
    transform: rotate(45deg);
    animation: bob 1.4s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(7px); }
  }

  /* Glow ring behind dhal when swords are out */
  #glow-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    height: 85%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(220,160,20,0.0) 40%, rgba(220,160,20,0.0) 100%);
    z-index: 0;
    pointer-events: none;
    transition: background 0.3s;
  }
</style>
</head>
<body>

<div class="scroll-wrapper" id="scrollWrapper">
  <div class="sticky-scene">
    <div class="scene" id="scene">
      <div id="glow-ring"></div>

<div class="hint" id="hint">
  <span>Scroll</span>
  <div class="chevron"></div>
</div>

<script>
  const wrapper = document.getElementById('scrollWrapper');
  const hint = document.getElementById('hint');
  const tLeft = document.getElementById('talwar-left');
  const tRight = document.getElementById('talwar-right');
  const glowRing = document.getElementById('glow-ring');

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function easeOut(t) { return 1 - Math.pow(1-t, 3); }

  function update() {
    const scrollTop = window.scrollY;
    const maxScroll = wrapper.offsetHeight - window.innerHeight;
    const raw = maxScroll > 0 ? scrollTop / maxScroll : 0;
    const t = easeInOut(clamp(raw, 0, 1));
    const tEarly = easeOut(clamp(raw * 1.4, 0, 1)); // swords move out faster at start

    // Hide hint after first scroll
    if (raw > 0.04) hint.classList.add('gone');
    else hint.classList.remove('gone');

    // ── LEFT TALWAR ──
    // At t=0: swords are BEHIND the shield (hidden/overlapping)
    // At t=1: swords have slid OUT to the sides
    // Left sword slides from center-ish to far left, rotates slightly
    const lTransX = lerp(0, -68, tEarly);   // slide left (% units relative to scene)
    const lTransY = lerp(0, 22, tEarly);    // drift down slightly  
    const lRot = lerp(0, -8, tEarly);       // rotate CCW slightly as it exits
    const lScale = lerp(0.82, 1.0, tEarly);
    const lOpacity = lerp(0.0, 1.0, clamp(raw * 5, 0, 1)); // fade in quickly

    tLeft.style.transform = `translate(${lTransX}%, ${lTransY}%) rotate(${lRot}deg) scale(${lScale})`;
    tLeft.style.opacity = lOpacity;
    tLeft.style.zIndex = t > 0.3 ? 1 : 3; // briefly behind then in front

    // ── RIGHT TALWAR ──
    // Right sword slides to right (mirror of left)
    const rTransX = lerp(0, 68, tEarly);
    const rTransY = lerp(0, 22, tEarly);
    const rRot = lerp(0, 8, tEarly);
    const rScale = lerp(0.82, 1.0, tEarly);
    const rOpacity = lerp(0.0, 1.0, clamp(raw * 5, 0, 1));

    // scaleX(-1) mirrors it, so we apply transform AFTER the mirror flip
    tRight.style.transform = `scaleX(-1) translate(${-rTransX}%, ${rTransY}%) rotate(${-rRot}deg) scale(${rScale})`;
    tRight.style.opacity = rOpacity;

    // ── GLOW ──
    const glowAlpha = lerp(0, 0.25, tEarly);
    glowRing.style.boxShadow = `0 0 ${lerp(0, 80, tEarly)}px ${lerp(0,40,tEarly)}px rgba(210,150,20,${glowAlpha})`;
  }

  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
</script>
